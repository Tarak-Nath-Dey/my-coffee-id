name: flutter_application_1
description: "A Flutter Coffee Preferences app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Required for Poppins font used in AppTheme typography
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/img/coffee_bg.jpg
    - assets/img/coffee_bean.png
    - assets/img/sugar_cube.png